version: 2

models:
  - name: stg_customers
    description: "Cleaned customers (one row per customer)."
    columns:
      - name: customer_id
        description: "Primary key."
        data_tests: [unique, not_null]
      - name: country_code
        data_tests: [not_null]

  - name: stg_orders
    description: "Cleaned orders (one row per order)."
    columns:
      - name: order_id
        description: "Primary key."
        data_tests: [unique, not_null]
      - name: customer_id
        data_tests:
          - not_null
          - relationships:
              to: ref('stg_customers')
              field: customer_id
      - name: status
        data_tests:
          - accepted_values:
              values: ["completed", "pending", "returned"]
